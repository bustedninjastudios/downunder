name: "godot-ci export"
on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'

# NOTE: If your `project.godot` is at the repository root, set `PROJECT_PATH` below to ".".

env:
  GODOT_VERSION: 4.6.1
  EXPORT_NAME: downunder
  PROJECT_PATH: .
  itchio_project: cane1712/down-under
  itchio_channel: windows
  BUTLER_API_KEY: ${{secrets.BUTLER_API_KEY}}

permissions:
  contents: write
  pages: write

jobs:
  check-and-tag:
    name: Check and Tag
    runs-on: ubuntu-latest
    outputs:
      trigger: ${{ steps.check.outputs.trigger }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for trigger
        id: check
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            # If this workflow was triggered by a tag push, we just build.
            echo "trigger=true" >> "$GITHUB_OUTPUT"
            echo "version=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            # Triggered by a branch push, check commit message.
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            if [[ "$COMMIT_MSG" == *"force_ci"* ]] || [[ "$COMMIT_MSG" == *"force_build"* ]] || [[ "$COMMIT_MSG" =~ v[0-9]+\.[0-9]+(\.[0-9]+)? ]]; then
              echo "trigger=true" >> "$GITHUB_OUTPUT"
              if [[ "$COMMIT_MSG" =~ (v[0-9]+\.[0-9]+(\.[0-9]+)?) ]]; then
                echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
              else
                echo "version=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
              fi
            else
              echo "trigger=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Create and Push Tag
        if: steps.check.outputs.trigger == 'true' && !startsWith(github.ref, 'refs/tags/')
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          echo "Creating tag $VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"

  export-windows:
    name: Windows Export
    needs: check-and-tag
    if: needs.check-and-tag.outputs.trigger == 'true'
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Windows Build
        run: |
          mkdir -v -p build/windows
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Windows Desktop" "$EXPORT_DIR/windows/$EXPORT_NAME.exe"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/windows

  export-linux:
    name: Linux Export
    needs: check-and-tag
    if: needs.check-and-tag.outputs.trigger == 'true'
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Linux Build
        run: |
          mkdir -v -p build/linux
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Linux" "$EXPORT_DIR/linux/$EXPORT_NAME.x86_64"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/linux

  export-web:
    name: Web Export
    needs: check-and-tag
    if: needs.check-and-tag.outputs.trigger == 'true'
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Web Build
        run: |
          mkdir -v -p build/web
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Web" "$EXPORT_DIR/web/index.html"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: build/web

  export-mac:
    name: Mac Export
    needs: check-and-tag
    if: needs.check-and-tag.outputs.trigger == 'true'
    runs-on: ubuntu-24.04
    container:
      image: barichello/godot-ci:4.6.1
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Mac Build
        run: |
          mkdir -v -p build/mac
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "macOS" "$EXPORT_DIR/mac/$EXPORT_NAME.zip"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: build/mac

  publish-itchio:
    name: Publish to Itch.io
    runs-on: ubuntu-latest
    needs: [check-and-tag, export-windows, export-linux, export-web, export-mac]
    if: needs.check-and-tag.outputs.trigger == 'true'
    steps:
      - name: Download windows
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: build/windows

      - name: Download linux
        uses: actions/download-artifact@v4
        with:
          name: linux
          path: build/linux

      - name: Download web
        uses: actions/download-artifact@v4
        with:
          name: web
          path: build/web

      - name: Download mac
        uses: actions/download-artifact@v4
        with:
          name: mac
          path: build/mac

      - name: Upload windows to itch.io
        uses: robpc/itchio-upload-action@v1
        with:
          path: build/windows
          project: ${{ env.itchio_project }}
          channel: windows
          version: ${{ needs.check-and-tag.outputs.version }}
          api-key: ${{ secrets.BUTLER_API_KEY }}

      - name: Upload linux to itch.io
        uses: robpc/itchio-upload-action@v1
        with:
          path: build/linux
          project: ${{ env.itchio_project }}
          channel: linux
          version: ${{ needs.check-and-tag.outputs.version }}
          api-key: ${{ secrets.BUTLER_API_KEY }}

      - name: Upload web to itch.io
        uses: robpc/itchio-upload-action@v1
        with:
          path: build/web
          project: ${{ env.itchio_project }}
          channel: web
          version: ${{ needs.check-and-tag.outputs.version }}
          api-key: ${{ secrets.BUTLER_API_KEY }}

      - name: Upload mac to itch.io
        uses: robpc/itchio-upload-action@v1
        with:
          path: build/mac
          project: ${{ env.itchio_project }}
          channel: mac
          version: ${{ needs.check-and-tag.outputs.version }}
          api-key: ${{ secrets.BUTLER_API_KEY }}
