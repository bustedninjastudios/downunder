name: "godot-ci export"
on: push

# NOTE: If your `project.godot` is at the repository root, set `PROJECT_PATH` below to ".".

env:
  GODOT_VERSION: 4.3
  EXPORT_NAME: downunder
  PROJECT_PATH: .
  itchio_project: cane1712/down-under
  itchio_channel: windows
  BUTLER_API_KEY: ${{secrets.BUTLER_API_KEY}}

#fuck you
permissions:
  contents: write
  pages: write

jobs:
  export-windows:
    name: Windows Export
    runs-on: ubuntu-24.04  # Use 24.04 with godot 4
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mkdir -v -p ~/.config/
          mv /root/.config/godot ~/.config/godot
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Windows Build
        run: |
          mkdir -v -p build/windows
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Windows Desktop" "$EXPORT_DIR/windows/$EXPORT_NAME.exe"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows
          path: build/windows

  export-linux:
    name: Linux Export
    runs-on: ubuntu-24.04  # Use 24.04 with godot 4
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Linux Build
        run: |
          mkdir -v -p build/linux
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Linux" "$EXPORT_DIR/linux/$EXPORT_NAME.x86_64"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/linux

  export-web:
    name: Web Export
    runs-on: ubuntu-24.04  # Use 24.04 with godot 4
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Web Build
        run: |
          mkdir -v -p build/web
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "Web" "$EXPORT_DIR/web/index.html"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web
          path: build/web

  export-mac:
    name: Mac Export
    runs-on: ubuntu-24.04  # Use 24.04 with godot 4
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true
      - name: Setup
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates/
          mv /root/.local/share/godot/export_templates/${GODOT_VERSION}.stable ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
      - name: Mac Build
        run: |
          mkdir -v -p build/mac
          EXPORT_DIR="$(readlink -f build)"
          cd $PROJECT_PATH
          godot --headless --verbose --export-release "macOS" "$EXPORT_DIR/mac/$EXPORT_NAME.zip"
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac
          path: build/mac

  publish-itchio:
    name: Publish to Itch.io
    runs-on: ubuntu-latest
    needs: [export-windows, export-linux, export-web, export-mac]
    steps:
      - name: Download windows
        uses: actions/download-artifact@v4
        with:
          name: windows
          path: build/windows

      - name: Download linux
        uses: actions/download-artifact@v4
        with:
          name: linux
          path: build/linux

      - name: Download web
        uses: actions/download-artifact@v4
        with:
          name: web
          path: build/web

      - name: Download mac
        uses: actions/download-artifact@v4
        with:
          name: mac
          path: build/mac

      - name: Extract version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_ENV
          else
            echo "version=0.0.0-${GITHUB_SHA::7}" >> $GITHUB_ENV
          fi
      - name: Install rsync 
        run: |
          apt-get update && apt-get install -y rsync

      - name: Upload windows to itch.io
        uses: robpc/itchio-upload-action@v1
        with:
          path: build/windows
          project: ${{ env.itchio_project }}
          channel: windows
          version: ${{ env.version }}
          api-key: ${{ secrets.BUTLER_API_KEY }}

      - name: Upload linux to itch.io
        uses: robpc/itchio-upload-action@v1
        with:
          path: build/linux
          project: ${{ env.itchio_project }}
          channel: linux
          version: ${{ env.version }}
          api-key: ${{ secrets.BUTLER_API_KEY }}

      - name: Upload web to itch.io
        uses: robpc/itchio-upload-action@v1
        with:
          path: build/web
          project: ${{ env.itchio_project }}
          channel: web
          version: ${{ env.version }}
          api-key: ${{ secrets.BUTLER_API_KEY }}

      - name: Upload web to Pages
        uses: JamesIves/github-pages-deploy-action@releases/v4
        with:
          branch: gh-pages # The branch the action should deploy to.
          folder: build/web # The folder the action should deploy.

      - name: Upload mac to itch.io
        uses: robpc/itchio-upload-action@v1
        with:
          path: build/mac
          project: ${{ env.itchio_project }}
          channel: mac
          version: ${{ env.version }}
          api-key: ${{ secrets.BUTLER_API_KEY }}
