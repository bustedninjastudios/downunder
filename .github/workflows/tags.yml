name: Auto Tag Release

on:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          # Note: If you want the tag push to trigger 'main.yml', you MUST use a Personal Access Token (PAT)
          # instead of the default GITHUB_TOKEN. Github Actions prevents infinite loops by not triggering
          # workflows from default token pushes.
          # To do this, uncomment the line below and add your PAT as a secret called PAT_TOKEN.
          # token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0

      - name: Check for trigger word in commit message
        id: check
        run: |
          COMMIT_MSG="${{ github.event.head_commit.message }}"
          echo "Commit message: $COMMIT_MSG"
          # Look for force_ci or a version string like v1.2.3 in the commit message
          if [[ "$COMMIT_MSG" == *"force_ci"* ]] || [[ "$COMMIT_MSG" =~ v[0-9]+\.[0-9]+(\.[0-9]+)? ]]; then
            echo "Trigger found."
            echo "trigger=true" >> "$GITHUB_OUTPUT"
            
            if [[ "$COMMIT_MSG" =~ (v[0-9]+\.[0-9]+(\.[0-9]+)?) ]]; then
              echo "version=${BASH_REMATCH[1]}" >> "$GITHUB_OUTPUT"
            else
              # Fallback if just 'force_ci' was present but no actual version tag
              echo "version=v1.0.${{ github.run_number }}" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "trigger=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and Push Tag
        if: steps.check.outputs.trigger == 'true'
        run: |
          VERSION="${{ steps.check.outputs.version }}"
          echo "Creating tag $VERSION"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$VERSION"
          git push origin "$VERSION"
